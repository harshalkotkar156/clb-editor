name: Build and deploy CodeCollab Backend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'   # ← only trigger when backend changes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: backend    # ← go into backend folder
        run: npm install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/             # ← only upload backend folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_141A7598FE56449BBA0E191605FD842F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_04C83665525B456488C8D4BA916D9A0A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_56676FB1A98F4A32BC832AE0DCA29F94 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'codesync'
          slot-name: 'Production'
          package: .